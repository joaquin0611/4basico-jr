<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Felicitaciones Maestro Heladero!</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght=400;700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        .tarjeta-final {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px 35px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(233, 30, 99, 0.15);
            border: 10px solid #ffffff;
            max-width: 520px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
        }

        .insignia-helado {
            font-size: 5.5rem;
            margin-bottom: 5px;
            display: inline-block;
            animation: flotarSuave 3s ease-in-out infinite;
        }

        .estrellas-animacion {
            font-size: 2.5rem;
            color: #f1c40f;
            margin-bottom: 15px;
            letter-spacing: 8px;
            text-shadow: 0 4px 10px rgba(241, 196, 15, 0.3);
            display: block;
        }

        h1 { 
            color: #ff4757; 
            font-size: 2.5rem; 
            margin: 0 0 15px 0;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* CONTENEDOR DEL TEXTO EN ESTILO KARAOKE */
        .texto-lectura { 
            color: #57606f; 
            font-size: 1.35rem; 
            font-weight: bold;
            line-height: 1.7;
            margin: 0 0 35px 0;
            text-align: center;
        }

        /* Estilo base para cada palabra antes de ser hablada */
        .palabra-karaoke {
            display: inline-block;
            margin-right: 6px;
            transition: all 0.15s ease;
            position: relative;
        }

        /* 🌟 EFECTO DE SUBRAYADO E ILUMINACIÓN MORADA AL HABLAR */
        .palabra-karaoke.resaltada {
            color: #6c5ce7; /* Cambia a un color morado/lila brillante */
            transform: scale(1.15); /* Se agranda ligeramente */
            text-shadow: 0 2px 8px rgba(108, 92, 231, 0.2);
        }
        
        .palabra-karaoke.resaltada::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 100%;
            height: 4px;
            background: #a29bfe; /* Línea de subrayado pastel debajo de la palabra */
            border-radius: 2px;
        }

        .btn-recomenzar {
            background: #7ed957;
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.3rem;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 7px 0 #5aa33e;
            transition: all 0.1s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-recomenzar:hover { background: #86e45e; }
        .btn-recomenzar:active { transform: translateY(4px); box-shadow: 0 3px 0 #5aa33e; }

        @keyframes flotarSuave {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="tarjeta-final animate__animated animate__jackInTheBox">
        <div class="insignia-helado">🍦🏆✨</div>
        <div class="estrellas-animacion">⭐⭐⭐</div>
        <h1>¡EXCELENTE TRABAJO!</h1>
        
        <div id="cuadro-texto-karaoke" class="texto-lectura"></div>
        
        <button class="btn-recomenzar" onclick="window.location.href='juego1.html'">🚀 Jugar Otra Vez</button>
    </div>

    <script>
        // El mensaje exacto que dirá la voz
        const textoCompleto = "¡Excelente trabajo! Hiciste los tres pedidos súper bien. ¡Ya estás listo para trabajar en la heladería!";

        // Función para preparar el texto en el HTML envolviendo cada palabra en un <span>
        function prepararTextoKaraoke() {
            const contenedor = document.getElementById("cuadro-texto-karaoke");
            const palabras = textoCompleto.split(" ");
            
            contenedor.innerHTML = palabras.map((palabra, indice) => {
                return `<span class="palabra-karaoke" id="palabra-${indice}">${palabra}</span>`;
            }).join("");
        }

        // Lanza lluvias de confeti
        function lanzarGranConfeti() {
            var duracion = 3500; 
            var fin = Date.now() + duracion;

            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 60, origin: { x: 0, y: 0.85 } });
                confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1, y: 0.85 } });
                if (Date.now() < fin) { requestAnimationFrame(frame); }
            }());
        }

        window.onload = function() {
            // 1. Dibujar las palabras en pantalla
            prepararTextoKaraoke();
            
            // 2. Iniciar el confeti
            lanzarGranConfeti();

            // 3. Audio de fondo corto (.mp3)
            const audioLogro = new Audio('sonidos/logro.mp3');
            audioLogro.play().catch(e => console.log("Nota: Audio sonidos/logro.mp3 listo."));
            
            // 4. Configurar la voz con el evento de rastreo de palabras (boundary)
            if ('speechSynthesis' in window) {
                setTimeout(() => {
                    const mensaje = new SpeechSynthesisUtterance(textoCompleto);
                    mensaje.lang = 'es-CL';
                    mensaje.rate = 0.95; // Velocidad ligeramente más pausada para que el niño pueda seguir la lectura
                    mensaje.pitch = 1.1;

                    let palabraIndice = 0;

                    // 🌟 ESTE EVENTO DETECTA CUÁNDO LA VOZ EMPIEZA UNA NUEVA PALABRA
                    mensaje.onboundary = function(event) {
                        if (event.name === 'word') {
                            // Quitamos el subrayado de la palabra anterior si existía
                            const palabraAnterior = document.getElementById(`palabra-${palabraIndice - 1}`);
                            if (palabraAnterior) {
                                palabraAnterior.classList.remove("resaltada");
                            }

                            // Subrayamos la palabra actual que está sonando
                            const palabraActual = document.getElementById(`palabra-${palabraIndice}`);
                            if (palabraActual) {
                                palabraActual.classList.add("resaltada");
                            }
                            
                            palabraIndice++;
                        }
                    };

                    // Al terminar de hablar, remueve el subrayado de la última palabra
                    mensaje.onend = function() {
                        const ultimaPalabra = document.getElementById(`palabra-${palabraIndice - 1}`);
                        if (ultimaPalabra) {
                            setTimeout(() => {
                                ultimaPalabra.classList.remove("resaltada");
                            }, 400);
                        }
                    };

                    window.speechSynthesis.speak(mensaje);
                }, 600);
            }
        };
    </script>
</body>
</html>
