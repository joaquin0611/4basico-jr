<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego 5 - Límites</title>
    <link rel="stylesheet" href="css/estilo_basico4.css">
</head>
<body>
    <div class="tarjeta-juego">
        <div class="barra-estado">
            <div>🎯 Nivel Final</div>
            <div id="puntos-box"></div>
            <div id="vidas-box"></div>
        </div>

        <h1>🎯 Juego 5: Precios en el Medio</h1>
        
        <div class="caja-instruccion" id="texto-instruccion" data-texto="El jefe te pide buscar el helado artesanal cuyo valor esté justo entre los cinco mil quinientos pesos y los seis mil pesos.">
            Cargando...
        </div>

        <div class="zona-flex-juego">
            <div class="bloque-opciones">
                <div class="tarjeta-helado" id="h5_5050" draggable="true">$5.050</div>
                <div class="tarjeta-helado" id="h5_5750" draggable="true">$5.750</div>
                <div class="tarjeta-helado" id="h5_6500" draggable="true">$6.500</div>
            </div>
            <div class="bloque-destino" id="caja-destino"></div>
        </div>

        <div class="btn-contenedor">
            <button class="btn-accion btn-reiniciar" onclick="recargarNivel()">🔄 Reiniciar</button>
            <button class="btn-accion btn-principal" onclick="validarRespuesta()">🏆 Terminar</button>
        </div>
    </div>

    <script src="js/script_basico4.js"></script>
    <script>
        window.onload = inicializarEstadoJuego;
        function validarRespuesta() {
            const destino = document.getElementById("caja-destino");
            const esCorrecto = destino.querySelector("#h5_5750") !== null;
            
            if (esCorrecto) {
                let puntos = parseInt(localStorage.getItem("puntaje_heladeria")) || 0;
                puntos += 100;
                localStorage.setItem("puntaje_heladeria", puntos);
                hablarYPasarNivel("¡Excelente! Completaste el último desafío con éxito.", "felicitaciones2.html", false);
            } else {
                let vidas = parseInt(localStorage.getItem("vidas_heladeria")) || 0;
                vidas--;
                localStorage.setItem("vidas_heladeria", ...[vidas]);
                
                if (vidas <= 0) {
                    hablarYPasarNivel("¡Oh, no! Te has quedado sin vidas. Vamos a ver tu puntuación final.", "felicitaciones2.html", false);
                } else {
                    hablarYPasarNivel("¡Oh, te equivocaste! Perderás una vida, pero lo volverás a intentar.", "juego5.html", true);
                }
            }
        }
    </script>
</body>
</html>
